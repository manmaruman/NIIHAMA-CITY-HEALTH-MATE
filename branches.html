*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',sans-serif;color:#1a1a1a;line-height:1.7;background:#fff}

nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,0.95);backdrop-filter:blur(8px);border-bottom:1px solid #e5e7eb;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px}
.nav-logo{font-size:14px;font-weight:700;color:#FF8C00;text-decoration:none;display:flex;align-items:center;gap:8px}
.nav-links{display:flex;gap:24px;list-style:none}
.nav-links a{font-size:13px;color:#555;text-decoration:none;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:#FF8C00;font-weight:700}
.nav-cta{background:#FF8C00;color:#fff;font-size:13px;padding:8px 16px;border-radius:20px;text-decoration:none}

.page-header{margin-top:60px;background:#FFF4E6;padding:48px 24px;text-align:center}
.page-header .label{font-size:12px;letter-spacing:3px;color:#FF8C00;font-weight:700;margin-bottom:8px}
.page-header h1{font-size:clamp(24px,3vw,36px);font-weight:700;color:#1a1a1a}
.page-header p{font-size:14px;color:#777;margin-top:8px}

.container{max-width:900px;margin:0 auto;padding:48px 24px 80px}

.branches-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}

.branch-card{background:#fff;border-radius:16px;border:1.5px solid #FFE0C0;overflow:hidden;transition:transform .2s,box-shadow .2s}
.branch-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(255,140,0,0.12)}

.branch-header{background:linear-gradient(135deg,#FF8C00,#FFB347);padding:20px 24px}
.branch-number{font-size:11px;color:rgba(255,255,255,0.8);font-weight:700;letter-spacing:2px;margin-bottom:4px}
.branch-name{font-size:20px;font-weight:700;color:#fff}

.branch-body{padding:20px 24px}
.branch-item{display:flex;gap:12px;margin-bottom:16px}
.branch-item:last-child{margin-bottom:0}
.branch-icon{width:32px;height:32px;border-radius:50%;background:#FFF4E6;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;margin-top:2px}
.branch-info-label{font-size:11px;font-weight:700;color:#FF8C00;letter-spacing:1px;margin-bottom:2px}
.branch-info-text{font-size:14px;color:#333;line-height:1.6}

.state-msg{text-align:center;padding:60px 24px;color:#999;font-size:14px}
.empty-icon{font-size:48px;margin-bottom:12px}

/* マップ */
.map-section{margin-bottom:48px}
.map-section h2{font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:16px}
#branch-map{height:400px;border-radius:16px;border:1.5px solid #FFE0C0;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
.leaflet-popup-content-wrapper{border-radius:12px;font-family:'Noto Sans JP',sans-serif}
.map-popup-name{font-weight:700;font-size:14px;color:#FF8C00;margin-bottom:4px}
.map-popup-place{font-size:12px;color:#555}

footer{background:#CC6F00;color:#fff;padding:32px 24px;text-align:center}

@media(max-width:768px){
  .nav-links{display:none}
  .branches-grid{grid-template-columns:1fr}

<div class="page-header">
  <div class="label">BRANCH</div>
  <h1>支部情報</h1>
  <p>新居浜市内の各支部の活動場所・日程をご案内します</p>
</div>

<div class="container">
  <div class="map-section">
    <h2>支部マップ</h2>
    <div id="branch-map"></div>
  </div>
  <div class="branches-grid" id="branches-grid">
    <div class="state-msg" style="grid-column:1/-1">
      <div class="empty-icon">🏠</div>
      <p>支部情報を読み込んでいます…</p>
    </div>
  </div>
</div>

<footer>
  <div style="font-size:14px;font-weight:700;">🌿 新居浜市食生活改善推進協議会</div>
  <p>© 2026 新居浜市食生活改善推進協議会 All rights reserved.</p>
</footer>

<script>
// スプレッドシートを「支部情報」シートで公開後、このURLを差し替えてください
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQLFT2rZe6n58E2YcJorAQ9QpQhGraUWtq8TVccCf1TH1ltghg66wNxmhcVn1rvuQxNATdrwbS0CsKn/pub?gid=1781789553&single=true&output=csv';

// 新居浜市を中心に初期表示
const map = L.map('branch-map').setView([33.9609, 133.2839], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 18
}).addTo(map);

const markerIcon = L.divIcon({
  className: '',
  html: '<div style="background:#FF8C00;width:32px;height:32px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:14px;">📍</div>',
  iconSize: [32, 32],
  iconAnchor: [16, 32],
  popupAnchor: [0, -34]
});

async function geocode(placeName) {
  const query = encodeURIComponent('愛媛県新居浜市 ' + placeName);
  const url = `https://nominatim.openstreetmap.org/search?q=${query}&format=json&limit=1`;
  const res = await fetch(url, { headers: { 'Accept-Language': 'ja' } });
  const data = await res.json();
  if (data.length > 0) return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
  return null;
}

async function loadBranches() {
  const grid = document.getElementById('branches-grid');
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    if (text.trimStart().startsWith('<')) throw new Error('未公開');
    const rows = parseCSV(text).slice(1);
    // 列: No, 支部名, 主な活動場所, 主な開催日程, 公開
    const branches = rows
      .filter(r => r[4] && r[4].trim() === '公開' && r[1])
      .map(r => ({ no: r[0], name: r[1], place: r[2], schedule: r[3] }));

    if (branches.length === 0) {
      grid.innerHTML = `<div class="state-msg" style="grid-column:1/-1">
        <div class="empty-icon">🏠</div><p>公開中の支部情報はありません</p>
      </div>`;
      return;
    }

    // カード表示
    grid.innerHTML = branches.map(b => `
      <div class="branch-card">
        <div class="branch-header">
          <div class="branch-number">No.${b.no}</div>
          <div class="branch-name">${b.name}</div>
        </div>
        <div class="branch-body">
          <div class="branch-item">
            <div class="branch-icon">📍</div>
            <div>
              <div class="branch-info-label">主な活動場所</div>
              <div class="branch-info-text">${b.place || '―'}</div>
            </div>
          </div>
          <div class="branch-item">
            <div class="branch-icon">📅</div>
            <div>
              <div class="branch-info-label">主な開催日程</div>
              <div class="branch-info-text">${b.schedule || '―'}</div>
            </div>
          </div>
        </div>
      </div>
    `).join('');

    // マップにピンを追加（Nominatim 利用規約: 1秒/リクエスト）
    const bounds = [];
    for (let i = 0; i < branches.length; i++) {
      const b = branches[i];
      if (!b.place) continue;
      if (i > 0) await new Promise(r => setTimeout(r, 1100));
      const latlng = await geocode(b.place);
      if (!latlng) continue;
      bounds.push(latlng);
      L.marker(latlng, { icon: markerIcon })
        .addTo(map)
        .bindPopup(`<div class="map-popup-name">${b.name}</div><div class="map-popup-place">${b.place}</div>`);
    }
    if (bounds.length > 1) map.fitBounds(bounds, { padding: [40, 40] });
    else if (bounds.length === 1) map.setView(bounds[0], 15);
  } catch(e) {
    grid.innerHTML = `<div class="state-msg" style="grid-column:1/-1">
      <div class="empty-icon">⚠️</div><p>支部情報の読み込みに失敗しました</p>
    </div>`;
  }
}

function parseCSV(text) {
  const rows = [];
  let cells = [], cur = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQ) {
      if (ch === '"' && text[i+1] === '"') { cur += '"'; i++; }
      else if (ch === '"') { inQ = false; }
      else { cur += ch; }
    } else {
      if (ch === '"') { inQ = true; }
      else if (ch === ',') { cells.push(cur.trim()); cur = ''; }
      else if (ch === '\n') {
        cells.push(cur.trim()); cur = '';
        if (cells.some(c => c)) rows.push(cells);
        cells = [];
      } else if (ch !== '\r') { cur += ch; }
    }
  }
  if (cur || cells.length) { cells.push(cur.trim()); if (cells.some(c => c)) rows.push(cells); }
  return rows;
}

loadBranches();
</script>
</body>
